version: 2
interactions:
- request:
    method: POST
    url: https://api.minimax.chat/v1/openai/chat/completions
    body: '{"model":"minimax-abab6.5-chat","messages":[{"role":"user","content":"What is 2+2? Just give me the number."}]}'
    headers:
      content-type:
      - application/json
  response:
    status: 200
    body: '{"id":"minimax-test-123","object":"chat.completion","created":1234567890,"model":"minimax-abab6.5-chat","choices":[{"index":0,"message":{"role":"assistant","content":"4"},"finish_reason":"stop"}],"usage":{"prompt_tokens":10,"completion_tokens":5,"total_tokens":15}}'
    headers:
      content-type:
      - application/json
